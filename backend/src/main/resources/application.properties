# Spring Boot Configuration
spring.application.name=dream-vacation
server.port=${SERVER_PORT:8080}

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dream_vacation}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:dream_vacation_user}
spring.datasource.password=${DB_PASSWORD:changeme}

# JPA/Hibernate Configuration (PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.dreamvacation=DEBUG
